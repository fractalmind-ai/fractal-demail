name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  SUI_VERSION: testnet-v1.67.1

jobs:
  move:
    name: Move build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Sui CLI (${{ env.SUI_VERSION }})
        run: |
          set -euo pipefail
          ARCHIVE="sui-${SUI_VERSION}-ubuntu-x86_64.tgz"
          curl -fsSL "https://github.com/MystenLabs/sui/releases/download/${SUI_VERSION}/${ARCHIVE}" -o sui.tgz
          mkdir -p "$HOME/.local/bin"
          tar -xzf sui.tgz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: sui move build
        run: sui move build --path sui-contracts

      - name: sui move test
        run: sui move test --path sui-contracts

  go:
    name: Go client build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: client-go/go.sum
      - name: go vet
        run: go vet ./...
        working-directory: client-go
      - name: go test
        run: go test ./...
        working-directory: client-go

  gas-station-adapter:
    name: Gas station adapter build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: go vet
        run: go vet ./...
        working-directory: gas-station-adapter
      - name: go test
        run: go test ./...
        working-directory: gas-station-adapter

  bridge:
    name: Bridge build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: go vet
        run: go vet ./...
        working-directory: bridge
      - name: go test
        run: go test -race ./...
        working-directory: bridge
